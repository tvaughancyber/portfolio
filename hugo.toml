baseURL = "/"
canonifyURLs = false
relativeURLs = true
languageCode = "en-us"
title = "Tyler — Offensive Security"

[params]
  description = "Penetration testing writeups, research, and notes."
  author = "Tyler"
  github = "https://github.com/tvaughancyber"
  linkedin = "https://linkedin.com/in/tvaughan-cyber"
  email = "you@example.com"

[markup.highlight]
  noClasses = false
  style = "github-dark"
  lineNos = true
  codeFences = true

