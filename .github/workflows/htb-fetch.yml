name: Fetch HTB Stats

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch HTB profile
        run: |
          RESP=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.HTB_TOKEN }}" \
            -H "Accept: application/json" \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            -H "Referer: https://app.hackthebox.com/" \
            "https://labs.hackthebox.com/api/v4/user/profile/basic/1448104")
          echo "Profile response: $RESP"
          mkdir -p static/htb
          echo "$RESP" > static/htb/profile.json

      - name: Fetch avatar image
        continue-on-error: true
        run: |
          if [ -f static/htb/avatar.png ]; then
            echo "Avatar already exists, skipping download"
          else
            echo "No avatar found, downloading..."
            AVATAR=$(python3 -c "
          import json
          d = json.load(open('static/htb/profile.json'))
          p = d.get('profile', {})
          av = p.get('avatar') or p.get('avatar_url') or ''
          print(av)
            " 2>/dev/null || echo "")
            echo "Avatar URL: $AVATAR"
            if [ -n "$AVATAR" ]; then
              if [[ "$AVATAR" == http* ]]; then
                FULL_URL="$AVATAR"
              else
                FULL_URL="https://labs.hackthebox.com${AVATAR}"
              fi
              mkdir -p static/htb
              HTTP_CODE=$(curl -s -L -o static/htb/avatar.png -w "%{http_code}" \
                -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
                "$FULL_URL")
              echo "HTTP status: $HTTP_CODE"
              if [ "$HTTP_CODE" = "200" ]; then
                echo "Avatar downloaded OK"
              else
                echo "Avatar failed with HTTP $HTTP_CODE"
                rm -f static/htb/avatar.png
              fi
            else
              echo "No avatar URL found"
            fi
          fi

      - name: Fetch HTB activity (all pages)
        run: |
          python3 - << 'EOF'
          import urllib.request
          import json
          import os

          TOKEN = os.environ["HTB_TOKEN"]
          HEADERS = {
              "Authorization": f"Bearer {TOKEN}",
              "Accept": "application/json",
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36",
              "Referer": "https://app.hackthebox.com/",
          }
          USER_ID = 1448104
          all_items = []
          page = 1

          while True:
              url = f"https://labs.hackthebox.com/api/v5/user/profile/activity/{USER_ID}?page={page}"
              req = urllib.request.Request(url, headers=HEADERS)
              with urllib.request.urlopen(req) as resp:
                  data = json.loads(resp.read())

              items = data.get("data", [])
              all_items.extend(items)
              print(f"Page {page}: {len(items)} items")

              meta = data.get("meta", {})
              if page >= meta.get("lastPage", 1):
                  break
              page += 1

          print(f"Total activity items: {len(all_items)}")
          os.makedirs("static/htb", exist_ok=True)
          with open("static/htb/activity.json", "w") as f:
              json.dump({"data": all_items}, f)
          EOF
        env:
          HTB_TOKEN: ${{ secrets.HTB_TOKEN }}

      - name: Fetch season rank
        continue-on-error: true
        run: |
          RESP=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.HTB_TOKEN }}" \
            -H "Accept: application/json" \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            -H "Referer: https://app.hackthebox.com/" \
            "https://labs.hackthebox.com/api/v4/season/user/rank/15")
          echo "Season response: $RESP"
          if echo "$RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); sys.exit(0 if 'data' in d else 1)" 2>/dev/null; then
            echo "$RESP" > static/htb/season.json
            echo "Season data saved"
          else
            echo "Season endpoint returned error, skipping"
          fi

      - name: Fetch machine matrices
        run: |
          python3 - << 'EOF'
          import urllib.request
          import json
          import os
          import time

          TOKEN = os.environ["HTB_TOKEN"]
          HEADERS = {
              "Authorization": f"Bearer {TOKEN}",
              "Accept": "application/json",
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36",
              "Referer": "https://app.hackthebox.com/",
          }

          def fetch_with_retry(url, retries=3, backoff=5):
              for attempt in range(retries):
                  try:
                      req = urllib.request.Request(url, headers=HEADERS)
                      with urllib.request.urlopen(req, timeout=15) as resp:
                          return json.loads(resp.read())
                  except urllib.error.HTTPError as e:
                      if e.code == 429:
                          wait = backoff * (2 ** attempt)
                          print(f"  429 rate limit, waiting {wait}s...")
                          time.sleep(wait)
                      elif e.code == 404:
                          return None
                      else:
                          print(f"  HTTP {e.code}, skipping")
                          return None
                  except Exception as e:
                      print(f"  Error: {e}, retrying...")
                      time.sleep(backoff)
              return None

          # Load activity and deduplicate by machine id
          with open("static/htb/activity.json") as f:
              activity = json.load(f)

          seen = {}
          for item in activity.get("data", []):
              mid = item["id"]
              if mid not in seen or item["type"] == "root":
                  seen[mid] = item

          print(f"Unique machines: {len(seen)}")

          # Load existing matrices to avoid re-fetching
          existing = {}
          if os.path.exists("static/htb/matrices.json"):
              with open("static/htb/matrices.json") as f:
                  existing = json.load(f)
              print(f"Loaded {len(existing)} existing matrices")

          matrices = dict(existing)

          for mid, item in seen.items():
              if str(mid) in matrices:
                  print(f"Skip (cached): {item['name']} ({mid})")
                  continue

              print(f"Fetching: {item['name']} ({mid})")

              # Fetch matrix
              matrix_data = fetch_with_retry(
                  f"https://labs.hackthebox.com/api/v4/machine/graph/matrix/{mid}"
              )
              time.sleep(1.5)

              if not matrix_data:
                  continue

              agg = matrix_data.get("info", {}).get("aggregate")
              if not agg or not any(v > 0 for v in agg.values()):
                  print(f"  No matrix data (likely active box)")
                  continue

              # Fetch machine profile for OS and difficulty
              prof_data = fetch_with_retry(
                  f"https://labs.hackthebox.com/api/v4/machine/profile/{mid}"
              )
              time.sleep(1.5)

              if not prof_data:
                  continue

              info = prof_data.get("info", {})
              matrices[str(mid)] = {
                  "name":       item["name"],
                  "os":         info.get("os", "Linux"),
                  "difficulty": info.get("difficultyText", "Medium"),
                  "aggregate":  agg,
              }
              print(f"  OK: {item['name']} - {info.get('os')} {info.get('difficultyText')}")

          print(f"\nMatrices collected: {len(matrices)}")
          os.makedirs("static/htb", exist_ok=True)
          with open("static/htb/matrices.json", "w") as f:
              json.dump(matrices, f, indent=2)
          EOF
        env:
          HTB_TOKEN: ${{ secrets.HTB_TOKEN }}

      - name: Process data into stats.json
        run: |
          python3 scripts/process_htb.py

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add static/htb/
          git diff --staged --quiet || git commit -m "chore: update HTB stats [skip ci]"
          git push
