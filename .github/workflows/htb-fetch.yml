name: Fetch HTB Stats

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch HTB profile
        run: |
          curl -sf \
            -H "Authorization: Bearer ${{ secrets.HTB_TOKEN }}" \
            -H "Accept: application/json" \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            -H "Referer: https://app.hackthebox.com/" \
            "https://labs.hackthebox.com/api/v4/user/profile/basic/1448104" \
            -o static/htb/profile.json

      - name: Fetch avatar image
        continue-on-error: true
        run: |
          AVATAR=$(cat static/htb/profile.json | python3 -c "import sys,json; print(json.load(sys.stdin)['profile']['avatar'])" 2>/dev/null || echo "")
          if [ -n "$AVATAR" ]; then
            curl -sf \
              -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
              "https://labs.hackthebox.com${AVATAR}" \
              -o static/htb/avatar.png && echo "Avatar downloaded" || echo "Avatar download failed"
          else
            echo "No avatar URL found"
          fi

      - name: Fetch HTB activity
        run: |
          curl -sf \
            -H "Authorization: Bearer ${{ secrets.HTB_TOKEN }}" \
            -H "Accept: application/json" \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            -H "Referer: https://app.hackthebox.com/" \
            "https://labs.hackthebox.com/api/v4/user/profile/activity/1448104" \
            -o static/htb/activity.json

      - name: Fetch HTB graph
        continue-on-error: true
        run: |
          curl -sf \
            -H "Authorization: Bearer ${{ secrets.HTB_TOKEN }}" \
            -H "Accept: application/json" \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            -H "Referer: https://app.hackthebox.com/" \
            "https://labs.hackthebox.com/api/v4/user/profile/graph/radar/1448104?duration=1M" \
            -o static/htb/graph.json

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add static/htb/
          git diff --staged --quiet || git commit -m "chore: update HTB stats [skip ci]"
          git push
