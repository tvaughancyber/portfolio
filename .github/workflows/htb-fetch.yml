name: Fetch HTB Stats

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  workflow_dispatch:          # manual trigger from GitHub UI

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch HTB profile
        run: |
          curl -sf \
            -H "Authorization: Bearer ${{ secrets.HTB_TOKEN }}" \
            -H "Accept: application/json" \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            -H "Referer: https://app.hackthebox.com/" \
            "https://labs.hackthebox.com/api/v4/user/profile/basic/1448104" \
            -o static/htb/profile.json

      - name: Fetch HTB activity
        run: |
          curl -sf \
            -H "Authorization: Bearer ${{ secrets.HTB_TOKEN }}" \
            -H "Accept: application/json" \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            -H "Referer: https://app.hackthebox.com/" \
            "https://labs.hackthebox.com/api/v4/user/profile/activity/1448104" \
            -o static/htb/activity.json

      - name: Fetch HTB graph
        run: |
          curl -sf \
            -H "Authorization: Bearer ${{ secrets.HTB_TOKEN }}" \
            -H "Accept: application/json" \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            -H "Referer: https://app.hackthebox.com/" \
            "https://labs.hackthebox.com/api/v4/user/profile/graph/radar/1448104" \
            -o static/htb/graph.json

      - name: Fetch HTB season rank
        run: |
          curl -sf \
            -H "Authorization: Bearer ${{ secrets.HTB_TOKEN }}" \
            -H "Accept: application/json" \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            -H "Referer: https://app.hackthebox.com/" \
            "https://labs.hackthebox.com/api/v4/season/rank/1448104" \
            -o static/htb/season.json

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add static/htb/
          git diff --staged --quiet || git commit -m "chore: update HTB stats [skip ci]"
          git push
