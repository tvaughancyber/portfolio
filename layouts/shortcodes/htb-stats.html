<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

<style>
  :root {
    --bg:         #0d0f12;
    --surface:    #13161b;
    --surface-2:  #1a1e25;
    --border:     #252a34;
    --htb-green:  #9fef00;
    --htb-green-dim: rgba(159,239,0,0.12);
    --text:       #e2e8f0;
    --text-muted: #64748b;
    --text-dim:   #94a3b8;
    --user-own:   #38bdf8;
    --root-own:   #9fef00;
    --blood:      #ef4444;
    --font-mono:  'JetBrains Mono', monospace;
    --font-body:  'Inter', sans-serif;
    --radius:     8px;
    --radius-lg:  14px;
  }

  .htb-page {
    max-width: 1100px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }

  .htb-header {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 40px;
  }

  .htb-avatar {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    border: 2px solid var(--htb-green);
    object-fit: cover;
    background: var(--surface);
  }

  .htb-avatar-placeholder {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    border: 2px solid var(--htb-green);
    background: var(--surface-2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
  }

  .htb-header-text h2 {
    font-family: var(--font-mono);
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--htb-green);
    letter-spacing: -0.02em;
    margin: 0;
  }

  .htb-header-text .rank-badge {
    display: inline-block;
    margin-top: 4px;
    font-family: var(--font-mono);
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .htb-header-text .rank-badge span { color: var(--htb-green); }

  .stat-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
    margin-bottom: 32px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
  }

  .stat-card .label {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    margin-bottom: 6px;
  }

  .stat-card .value {
    font-family: var(--font-mono);
    font-size: 1.7rem;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
  }

  .stat-card .value.green { color: var(--htb-green); }
  .stat-card .value.blue  { color: var(--user-own); }

  .stat-card .sub {
    font-size: 0.75rem;
    color: var(--text-muted);
    margin-top: 4px;
  }

  .main-grid {
    display: grid;
    grid-template-columns: 1fr 340px;
    gap: 24px;
    margin-bottom: 32px;
  }

  @media (max-width: 760px) {
    .main-grid { grid-template-columns: 1fr; }
  }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
  }

  .panel-header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    font-family: var(--font-mono);
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .panel-body { padding: 20px; }

  .radar-wrap {
    position: relative;
    width: 100%;
    max-width: 300px;
    margin: 0 auto;
  }

  .pwn-list { list-style: none; }

  .pwn-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }

  .pwn-item:last-child { border-bottom: none; }

  .pwn-badge {
    font-family: var(--font-mono);
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    padding: 3px 8px;
    border-radius: 4px;
    min-width: 52px;
    text-align: center;
    text-transform: uppercase;
  }

  .pwn-badge.user  { background: rgba(56,189,248,0.15); color: var(--user-own); }
  .pwn-badge.root  { background: rgba(159,239,0,0.15);  color: var(--htb-green); }
  .pwn-badge.blood { background: rgba(239,68,68,0.15);  color: var(--blood); }

  .pwn-name {
    font-family: var(--font-mono);
    font-size: 0.88rem;
    font-weight: 600;
    color: var(--text);
    flex: 1;
  }

  .pwn-os   { font-size: 0.75rem; color: var(--text-muted); }

  .pwn-time {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    color: var(--text-muted);
    text-align: right;
    min-width: 60px;
  }


  .htb-state-msg {
    font-family: var(--font-mono);
    font-size: 0.85rem;
    color: var(--text-muted);
    padding: 20px 0;
    text-align: center;
  }

  .htb-state-msg.error { color: var(--blood); }

  .htb-blink { animation: htbBlink 1.2s step-start infinite; }
  @keyframes htbBlink { 50% { opacity: 0; } }

  .htb-footer {
    text-align: center;
    font-family: var(--font-mono);
    font-size: 0.72rem;
    color: var(--text-muted);
    margin-top: 48px;
  }

  .htb-footer a { color: var(--htb-green); text-decoration: none; }
</style>

<div class="htb-page">

  <div class="htb-header">
    <div class="htb-avatar-placeholder" id="avatarWrap">🎯</div>
    <div class="htb-header-text">
      <h2 id="htbUsername">Loading...</h2>
      <div class="rank-badge">Rank: <span id="htbRankName">—</span></div>
    </div>
  </div>

  <div class="stat-row">
    <div class="stat-card">
      <div class="label">User Owns</div>
      <div class="value blue" id="statUserOwns">—</div>
    </div>
    <div class="stat-card">
      <div class="label">System Owns</div>
      <div class="value green" id="statRootOwns">—</div>
    </div>
    <div class="stat-card">
      <div class="label">User Bloods</div>
      <div class="value" id="statUserBloods" style="color:#ef4444">—</div>
    </div>
    <div class="stat-card">
      <div class="label">System Bloods</div>
      <div class="value" id="statRootBloods" style="color:#ef4444">—</div>
    </div>
    <div class="stat-card">
      <div class="label">Points</div>
      <div class="value" id="statPoints">—</div>
    </div>
    <div class="stat-card">
      <div class="label">Global Rank</div>
      <div class="value" id="statRanking">—</div>
      <div class="sub" id="statNextRank"></div>
    </div>
  </div>


  <div class="main-grid">

    <div class="panel">
      <div class="panel-header">Recent Activity</div>
      <div class="panel-body">
        <ul class="pwn-list" id="pwnList">
          <li class="htb-state-msg">Fetching activity<span class="htb-blink">_</span></li>
        </ul>
      </div>
    </div>

    <div class="panel">
      <div class="panel-header">Skill Radar</div>
      <div class="panel-body">
        <div class="radar-wrap">
          <canvas id="radarChart"></canvas>
          <p class="htb-state-msg" id="radarMsg">Loading radar<span class="htb-blink">_</span></p>
        </div>
      </div>
    </div>

  </div>

  <div class="htb-footer">
    Data pulled live from <a href="https://hackthebox.com" target="_blank" rel="noopener">HackTheBox</a>
    via the unofficial v4 API &middot; Updates every 5 minutes
  </div>
</div>

<script>
  async function staticFetch(file) {
    const res = await fetch(`/htb/${file}`);
    if (!res.ok) throw new Error(`HTTP ${res.status} fetching ${file}`);
    return res.json();
  }

  async function loadProfile() {
    try {
      const { profile } = await staticFetch("profile.json");
      document.getElementById("htbUsername").textContent    = profile.name;
      document.getElementById("htbRankName").textContent    = profile.rank;
      document.getElementById("statUserOwns").textContent   = profile.user_owns;
      document.getElementById("statRootOwns").textContent   = profile.system_owns;
      document.getElementById("statUserBloods").textContent = profile.user_bloods;
      document.getElementById("statRootBloods").textContent = profile.system_bloods;
      document.getElementById("statPoints").textContent     = profile.points;
      document.getElementById("statRanking").textContent    = `#${profile.ranking}`;
      if (profile.next_rank) {
        document.getElementById("statNextRank").textContent =
          `→ ${profile.next_rank} (${(profile.rank_ownership * 1).toFixed(1)}% / ${profile.rank_requirement}%)`;
      }
      if (profile.avatar) {
        const img = document.createElement("img");
        img.src       = "/htb/avatar.png";
        img.alt       = profile.name;
        img.className = "htb-avatar";
        img.onerror   = () => {};
        document.getElementById("avatarWrap").replaceWith(img);
      }
    } catch (e) { console.error("Profile load error:", e); }
  }


  async function loadActivity() {
    const list = document.getElementById("pwnList");
    try {
      const { profile } = await staticFetch("activity.json");
      const items = (profile?.activity || []).slice(0, 15);
      if (!items.length) {
        list.innerHTML = '<li class="htb-state-msg">No recent activity found.</li>';
        return;
      }
      list.innerHTML = "";
      for (const item of items) {
        const typeStr  = (item.type || "").toLowerCase();
        const badgeCls = typeStr === "root" || typeStr === "system" ? "root"
                       : typeStr === "blood" ? "blood" : "user";
        const badgeLbl = typeStr === "root" || typeStr === "system" ? "SYSTEM"
                       : typeStr === "blood" ? "BLOOD"
                       : typeStr.toUpperCase() || "OWN";
        const ago = item.date ? relativeTime(new Date(item.date))
                  : (item.time_value ? `${item.time_value} ${item.time_unit} ago` : "");
        const li = document.createElement("li");
        li.className = "pwn-item";
        li.innerHTML = `
          <span class="pwn-badge ${badgeCls}">${badgeLbl}</span>
          <span class="pwn-name">${esc(item.name || item.object_type || "Unknown")}</span>
          <span class="pwn-os">${item.object_type === "Machine" ? "🖥" : "⚑"}</span>
          <span class="pwn-time">${esc(ago)}</span>`;
        list.appendChild(li);
      }
    } catch (e) {
      list.innerHTML = `<li class="htb-state-msg error">Failed to load activity</li>`;
      console.error("Activity load error:", e);
    }
  }

  async function loadRadar() {
    const msg = document.getElementById("radarMsg");
    try {
      const data   = await staticFetch("graph.json");
      const points = data?.data?.data || data?.data || [];
      if (!points.length) { msg.textContent = "No radar data available."; return; }
      msg.style.display = "none";
      new Chart(document.getElementById("radarChart"), {
        type: "radar",
        data: {
          labels:   points.map(p => p.name),
          datasets: [{
            label:               "Skill %",
            data:                points.map(p => parseFloat(p.value) || 0),
            backgroundColor:     "rgba(159,239,0,0.12)",
            borderColor:         "#9fef00",
            pointBackgroundColor:"#9fef00",
            pointBorderColor:    "#0d0f12",
            pointRadius:         4,
            borderWidth:         2,
          }],
        },
        options: {
          responsive: true, maintainAspectRatio: true,
          plugins: {
            legend: { display: false },
            tooltip: { callbacks: { label: ctx => ` ${ctx.raw.toFixed(1)}%` } },
          },
          scales: {
            r: {
              min: 0, max: 100,
              ticks: { display: false, stepSize: 25 },
              grid:       { color: "#252a34" },
              angleLines: { color: "#252a34" },
              pointLabels: { color: "#94a3b8", font: { family: "'JetBrains Mono', monospace", size: 10 } },
            },
          },
        },
      });
    } catch (e) {
      msg.textContent = "Radar unavailable";
      msg.classList.add("error");
      console.error("Radar load error:", e);
    }
  }

  function esc(s) {
    return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }
  function relativeTime(d) {
    const diff = Math.floor((Date.now() - d) / 1000);
    if (diff < 60)    return `${diff}s ago`;
    if (diff < 3600)  return `${Math.floor(diff/60)}m ago`;
    if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
    return `${Math.floor(diff/86400)}d ago`;
  }

  (async () => {
    await Promise.allSettled([loadProfile(), loadActivity(), loadRadar()]);
  })();
</script>
